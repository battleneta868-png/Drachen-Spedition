<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Drachen Spedition - Gemeinsam auf Achse</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; text-align: center; }
        header { background: #000; border-bottom: 4px solid #32CD32; padding: 40px; }
        .logo-main { width: 300px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 0 20px #32CD32; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .gallery { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 40px 0; }
        .gallery img { width: 250px; border-radius: 10px; border: 2px solid #32CD32; transition: 0.3s; }
        .gallery img:hover { transform: scale(1.05); }
        .btn { background: #32CD32; color: black; padding: 15px 30px; text-decoration: none; border-radius: 5px; font-weight: bold; display: inline-block; margin-top: 20px; }
        h2 { color: #32CD32; text-transform: uppercase; }
    </style>
</head>
<body>

<header>
    <!-- Dein Hauptlogo oben -->
    <img src="LINK_ZUM_LOGO_1" alt="Drachen Spedition Logo" class="logo-main">
    <h1>DRACHEN SPEDITION</h1>
    <p>Präzision. Stärke. Zusammenhalt.</p>
</header>

<div class="container">
    <div class="section">
        <h2>Über uns</h2>
        <p>Willkommen bei der Drachen Spedition! Wir sind eine aktive Gemeinschaft in ETS2 und ATS. Bei uns steht der Fahrspaß und ein respektvoller Umgang an erster Stelle.</p>
    </div>

    <!-- Deine Bildergalerie -->
    <h2>Unsere Flotte & Logos</h2>
    <div class="gallery">
        <img src="LINK_ZUM_TRUCK_BILD" alt="Drachen Truck">
        <img src="LINK_ZUM_LOGO_DRAGON" alt="Drachen Emblem">
        <img src="LINK_ZUM_LOGO_FLYING" alt="Fliegender Drache">
    </div>

    <div class="section">
        <a href="DEIN_DISCORD_LINK" class="btn">TRITT UNSEREM DISCORD BEI</a>
    </div>
</div>

</body>
</html>
